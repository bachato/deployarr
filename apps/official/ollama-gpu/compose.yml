services:
  # Ollama (GPU) - Local AI Models with GPU Acceleration (NVIDIA/AMD)
  ollama-gpu:
    image: GPU-IMAGE-PLACEHOLDER
    container_name: ollama-gpu
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    profiles: [ "apps", "all" ]
    networks:
      - default
    ports:
      - "$OLLAMA_GPU_PORT:11434"
    volumes:
      - $DOCKERDIR/appdata/ollama-gpu:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
    # GPU-CONFIG-PLACEHOLDER
    # DOCKER-LABELS-PLACEHOLDER
