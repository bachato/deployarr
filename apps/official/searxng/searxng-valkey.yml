services:
  # SearXNG Valkey - Dedicated Cache for SearXNG
  searxng-valkey:
    container_name: searxng-valkey
    image: docker.io/valkey/valkey:8-alpine
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    profiles: ["apps", "all"]
    command: valkey-server --save 30 1 --loglevel warning
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli ping | grep PONG"]
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 3s
    volumes:
      - $DOCKERDIR/appdata/searxng-valkey:/data
    networks:
      - default
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"
    # DOCKER-LABELS-PLACEHOLDER
