services:
  # Speedtest Tracker MariaDB - Dedicated Database for Speedtest Tracker
  speedtest-tracker-mariadb:
    container_name: speedtest-tracker-mariadb
    image: mariadb:latest
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    profiles: ["apps", "monitoring", "all"]
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 1m
      start_interval: 10s
      interval: 1m
      timeout: 5s
      retries: 3
    networks:
      - default
    volumes:
      - $DOCKERDIR/appdata/speedtest-tracker-mariadb:/var/lib/mysql
    environment:
      - MARIADB_ROOT_PASSWORD=$SPEEDTEST_MARIADB_ROOT_PASSWORD
      - MARIADB_DATABASE=speedtest
    # DOCKER-LABELS-PLACEHOLDER
