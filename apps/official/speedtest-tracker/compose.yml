services:
  # Speedtest Tracker - Internet Speed Monitoring
  speedtest-tracker:
    image: lscr.io/linuxserver/speedtest-tracker:latest
    container_name: speedtest-tracker
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    profiles: ["apps", "monitoring", "all"]
    networks:
      - default
    depends_on:
      speedtest-tracker-mariadb:
        condition: service_healthy
    ports:
      - $SPEEDTEST_TRACKER_PORT:80
    volumes:
      - $DOCKERDIR/appdata/speedtest-tracker:/config
    environment:
      - TZ=$TZ
      - PUID=$PUID
      - PGID=$PGID
      - APP_KEY=$SPEEDTEST_TRACKER_APP_KEY
      - DB_CONNECTION=mysql
      - DB_HOST=speedtest-tracker-mariadb
      - DB_PORT=3306
      - DB_DATABASE=speedtest
      - DB_USERNAME=root
      - DB_PASSWORD=$SPEEDTEST_MARIADB_ROOT_PASSWORD
    # DOCKER-LABELS-PLACEHOLDER
