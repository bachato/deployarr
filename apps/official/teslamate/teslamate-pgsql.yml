services:
  # PostgreSQL - Database for Teslamate
  teslamate-pgsql:
    container_name: teslamate-pgsql
    image: postgres:18-trixie
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    profiles: ["apps", "all"]
    # healthcheck:
    #   test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
    #   start_period: 20s
    #   interval: 30s
    #   retries: 5
    #   timeout: 5s
    networks:
      - default
    volumes:
      - $DOCKERDIR/appdata/teslamate-pgsql:/var/lib/postgresql
    environment:
      - POSTGRES_DB=teslamate
      - POSTGRES_USER=$TESLAMATE_PGSQL_USER
      - POSTGRES_PASSWORD=$TESLAMATE_PGSQL_PASSWD
    # DOCKER-LABELS-PLACEHOLDER