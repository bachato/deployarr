services:
  # Bookstack MariaDB - Dedicated Database for Bookstack
  bookstack-mariadb:
    container_name: bookstack-mariadb
    image: mariadb:latest
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    profiles: ["apps", "all"]
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 1m
      start_interval: 10s
      interval: 1m
      timeout: 5s
      retries: 3
    networks:
      - default
    volumes:
      - $DOCKERDIR/appdata/bookstack-mariadb:/var/lib/mysql
    environment:
      - MARIADB_DATABASE=bookstack
      - MARIADB_USER=bookstack_db_user
      - MARIADB_PASSWORD=$BOOKSTACK_MARIADB_PASSWORD
      - MARIADB_ROOT_PASSWORD=$BOOKSTACK_MARIADB_PASSWORD
    # DOCKER-LABELS-PLACEHOLDER
