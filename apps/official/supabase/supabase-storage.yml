services:
  # Supabase Storage - S3-compatible Object Storage
  supabase-storage:
    container_name: supabase-storage
    image: supabase/storage-api:${SUPABASESTORAGE_VERSION_PIN}
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    profiles: ["apps", "all"]
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:5000/status"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - default
    volumes:
      - $DOCKERDIR/appdata/supabase/storage:/var/lib/storage:Z
    environment:
      - ANON_KEY=ANON-KEY-PLACEHOLDER
      - SERVICE_KEY=SERVICE-ROLE-KEY-PLACEHOLDER
      - POSTGREST_URL=http://supabase-rest:3000
      - PGRST_JWT_SECRET=JWT-SECRET-PLACEHOLDER
      - DATABASE_URL=postgres://supabase_storage_admin:POSTGRES-PASSWORD-PLACEHOLDER@supabase-db:5432/postgres
      - FILE_SIZE_LIMIT=52428800
      - STORAGE_BACKEND=file
      - FILE_STORAGE_BACKEND_PATH=/var/lib/storage
      - TENANT_ID=stub
      - REGION=stub
      - GLOBAL_S3_BUCKET=stub
      - ENABLE_IMAGE_TRANSFORMATION=true
      - IMGPROXY_URL=http://supabase-imgproxy:5001
      - IMGPROXY_HTTP_MAX_SRC_RESOLUTION=200
      - S3_PROTOCOL_ACCESS_KEY_ID=S3-ACCESS-KEY-ID-PLACEHOLDER
      - S3_PROTOCOL_ACCESS_KEY_SECRET=S3-ACCESS-KEY-SECRET-PLACEHOLDER
    # DOCKER-LABELS-PLACEHOLDER
