services:
  # Ollama - Local Open-source AI Models
  ollama:
    image: ollama/ollama:${OLLAMA_IMAGE_TAG:-latest}
    container_name: ollama
    restart: unless-stopped
    profiles: [ "apps", "all" ]
    networks:
      - default
    ports:
      - "$OLLAMA_PORT:11434"
    volumes:
      - $DOCKERDIR/appdata/ollama:/root/.ollama
    # DEVICES-GPU-PLACEHOLDER-DO-NOT-DELETE
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      # DOCKER-LABELS-PLACEHOLDER
