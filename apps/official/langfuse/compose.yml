services:
  # Langfuse - LLM Observability & Analytics Platform
  langfuse:
    image: docker.io/langfuse/langfuse:${LANGFUSE_VERSION_PIN}
    container_name: langfuse
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    profiles: [ "apps", "all" ]
    networks:
      - default
    ports:
      - $LANGFUSE_PORT:3000
    environment:
      - NEXTAUTH_URL=https://langfuse.${DOMAINNAME_1}
      - NEXTAUTH_SECRET=NEXTAUTH-SECRET-PLACEHOLDER
      - SALT=SALT-PLACEHOLDER
      - ENCRYPTION_KEY=ENCRYPTION-KEY-PLACEHOLDER
      - DATABASE_URL=postgresql://langfuse_db_user:POSTGRESQL-PASSWORD-PLACEHOLDER@langfuse-postgresql:5432/langfuse
      - TELEMETRY_ENABLED=false
      - LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES=false
      - CLICKHOUSE_MIGRATION_URL=clickhouse://langfuse-clickhouse:9000
      - CLICKHOUSE_URL=http://langfuse-clickhouse:8123
      - CLICKHOUSE_USER=clickhouse
      - CLICKHOUSE_PASSWORD=CLICKHOUSE-PASSWORD-PLACEHOLDER
      - CLICKHOUSE_CLUSTER_ENABLED=false
      - LANGFUSE_S3_EVENT_UPLOAD_BUCKET=langfuse
      - LANGFUSE_S3_EVENT_UPLOAD_REGION=auto
      - LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID=minio
      - LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY=MINIO-PASSWORD-PLACEHOLDER
      - LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT=http://langfuse-minio:9000
      - LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE=true
      - LANGFUSE_S3_EVENT_UPLOAD_PREFIX=events/
      - LANGFUSE_S3_MEDIA_UPLOAD_BUCKET=langfuse
      - LANGFUSE_S3_MEDIA_UPLOAD_REGION=auto
      - LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID=minio
      - LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY=MINIO-PASSWORD-PLACEHOLDER
      - LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT=http://langfuse-minio:9000
      - LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE=true
      - LANGFUSE_S3_MEDIA_UPLOAD_PREFIX=media/
      - LANGFUSE_S3_BATCH_EXPORT_ENABLED=false
      - REDIS_HOST=langfuse-redis
      - REDIS_PORT=6379
      - REDIS_AUTH=REDIS-PASSWORD-PLACEHOLDER
      # Headless initialization (placeholders removed if user opts out)
      - LANGFUSE_INIT_ORG_ID=HEADLESS-ORG-PLACEHOLDER
      - LANGFUSE_INIT_ORG_NAME=HEADLESS-ORGNAME-PLACEHOLDER
      - LANGFUSE_INIT_PROJECT_ID=HEADLESS-PROJECT-PLACEHOLDER
      - LANGFUSE_INIT_PROJECT_NAME=HEADLESS-PROJECTNAME-PLACEHOLDER
      - LANGFUSE_INIT_USER_EMAIL=HEADLESS-EMAIL-PLACEHOLDER
      - LANGFUSE_INIT_USER_NAME=HEADLESS-USERNAME-PLACEHOLDER
      - LANGFUSE_INIT_USER_PASSWORD=HEADLESS-PASSWORD-PLACEHOLDER
    # DOCKER-LABELS-PLACEHOLDER
