services:
  # Guacamole - Remote desktop, SSH, VNC, Telnet on any HTML5 Browser
  guacamole:
    image: guacamole/guacamole:${GUACAMOLE_VERSION_PIN}
    container_name: guacamole
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    profiles: ["apps", "all"]
    depends_on:
      guacamole-mariadb:
        condition: service_healthy
      guacd:
        condition: service_started
    networks:
      - default
    ports:
      - "$GUACAMOLE_PORT:8080"
    environment:
      GUACD_HOSTNAME: guacd
      MYSQL_HOSTNAME: guacamole-mariadb
      MYSQL_PORT: 3306
      MYSQL_DATABASE: guacamole
      MYSQL_USER: guacamole_db_user
      MYSQL_PASSWORD: $GUACAMOLE_MARIADB_PASSWORD
    # DOCKER-LABELS-PLACEHOLDER
