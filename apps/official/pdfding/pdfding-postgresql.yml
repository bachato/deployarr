services:
  # PdfDing PostgreSQL - Dedicated Database for PdfDing
  pdfding-postgresql:
    container_name: pdfding-postgresql
    image: postgres:${PDFDINGPOSTGRESQL_VERSION_PIN}
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    profiles: ["apps", "all"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d pdfding -U pdfding_db_user"]
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 5s
    networks:
      - default
    volumes:
      - $DOCKERDIR/appdata/pdfding-postgresql:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=pdfding
      - POSTGRES_USER=pdfding_db_user
      - POSTGRES_PASSWORD=$PDFDING_POSTGRESQL_PASSWORD
    # DOCKER-LABELS-PLACEHOLDER
