services:
  # PdfDing - Self-hosted PDF Management
  pdfding:
    container_name: pdfding
    image: mrmn/pdfding:${PDFDING_VERSION_PIN}
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    profiles: ["apps", "all"]
    networks:
      - default
    depends_on:
      pdfding-postgresql:
        condition: service_healthy
    ports:
      - "$PDFDING_PORT:8000"
    volumes:
      - $DOCKERDIR/appdata/pdfding:/home/nonroot/pdfding/media
    environment:
      - DEFAULT_THEME=dark
      - DEFAULT_THEME_COLOR=blue
      - SECRET_KEY=$PDFDING_SECRET_KEY
      - HOST_NAME=PDFDING_HOSTNAME_PLACEHOLDER
      - DATABASE_TYPE=POSTGRES
      - POSTGRES_PASSWORD=$PDFDING_POSTGRESQL_PASSWORD
      - POSTGRES_HOST=pdfding-postgresql
      - POSTGRES_PORT=5432
      - POSTGRES_DB=pdfding
      - POSTGRES_USER=pdfding_db_user
      - CSRF_COOKIE_SECURE=TRUE
      - SESSION_COOKIE_SECURE=TRUE
    # DOCKER-LABELS-PLACEHOLDER
