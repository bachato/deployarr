services:
  # Nextcloud - Content Collaboration Platform
  nextcloud:
    image: nextcloud:${NEXTCLOUD_VERSION_PIN}
    container_name: nextcloud
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    profiles: ["apps", "all"]
    networks:
      - default
    depends_on:
      nextcloud-mariadb:
        condition: service_healthy
      nextcloud-redis:
        condition: service_healthy
    ports:
      - "$NEXTCLOUD_PORT:80"
    volumes:
      - $DOCKERDIR/appdata/nextcloud:/var/www/html
      - $NEXTCLOUD_FOLDER:/var/www/html/data
    environment:
      - MYSQL_PASSWORD_FILE=/run/secrets/nextcloud_mariadb_password
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud_db_user
      - MYSQL_HOST=nextcloud-mariadb
      - REDIS_HOST=nextcloud-redis
      - NEXTCLOUD_ADMIN_USER=$NEXTCLOUD_ADMIN_USER
      - NEXTCLOUD_ADMIN_PASSWORD_FILE=/run/secrets/nextcloud_admin_password
      # Uncomment after initial setup if using Traefik:
      # - NEXTCLOUD_TRUSTED_DOMAINS=$NEXTCLOUD_SUBDOMAIN.$DOMAINNAME_1
      - TRUSTED_PROXIES=192.168.90.0/24
      # - OVERWRITEHOST=$NEXTCLOUD_SUBDOMAIN.$DOMAINNAME_1
      - OVERWRITEPROTOCOL=https
    secrets:
      - nextcloud_admin_password
      - nextcloud_mariadb_password
    # DOCKER-LABELS-PLACEHOLDER
