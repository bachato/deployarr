services:
  # Paperless-NGX Redis - Dedicated Cache for Paperless-NGX
  paperless-ngx-redis:
    container_name: paperless-ngx-redis
    image: redis:${PAPERLESSNGXREDIS_VERSION_PIN}
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    profiles: ["apps", "all"]
    command: redis-server --save "" --maxmemory 256mb --appendonly no --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 3s
    networks:
      - default
    deploy:
      resources:
        limits:
          memory: 256MB
    # DOCKER-LABELS-PLACEHOLDER
