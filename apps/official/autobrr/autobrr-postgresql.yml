services:
  # Autobrr PostgreSQL - Dedicated Database for Autobrr
  autobrr-postgresql:
    container_name: autobrr-postgresql
    image: postgres:${AUTOBRRPOSTGRESQL_VERSION_PIN}
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    profiles: ["apps", "all"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d autobrr -U autobrr_db_user"]
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 5s
    networks:
      - default
    volumes:
      - $DOCKERDIR/appdata/autobrr-postgresql:/var/lib/postgresql
    environment:
      - POSTGRES_DB=autobrr
      - POSTGRES_USER=autobrr_db_user
      - POSTGRES_PASSWORD=$AUTOBRR_POSTGRESQL_PASSWORD
    # DOCKER-LABELS-PLACEHOLDER
