services:
  # Autobrr - Download Automation for Torrents and Usenet
  autobrr:
    image: ghcr.io/autobrr/autobrr:${AUTOBRR_VERSION_PIN}
    container_name: autobrr
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    profiles: ["apps", "all"]
    networks:
      - default
    depends_on:
      autobrr-postgresql:
        condition: service_healthy
    ports:
      - $AUTOBRR_PORT:7474/tcp
    volumes:
      - $DOCKERDIR/appdata/autobrr:/config
    environment:
      - AUTOBRR__DATABASE_TYPE=postgres
      - AUTOBRR__POSTGRES_HOST=autobrr-postgresql
      - AUTOBRR__POSTGRES_PORT=5432
      - AUTOBRR__POSTGRES_USER=autobrr_db_user
      - AUTOBRR__POSTGRES_PASS=$AUTOBRR_POSTGRESQL_PASSWORD
      - AUTOBRR__POSTGRES_DATABASE=autobrr
      - AUTOBRR__LOG_LEVEL=INFO
    # DOCKER-LABELS-PLACEHOLDER
