services:
  # Scrutiny - WebUI for smartd S.M.A.R.T monitoring
  scrutiny:
    image: ghcr.io/analogj/scrutiny:${SCRUTINY_VERSION_PIN}
    container_name: scrutiny
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    profiles: ["apps", "monitoring", "all"]
    networks:
      - default
    depends_on:
      scrutiny-influxdb:
        condition: service_healthy
    ports:
      - $SCRUTINY_PORT:8080
    volumes:
      - $DOCKERDIR/appdata/scrutiny:/opt/scrutiny/config
    environment:
      - SCRUTINY_WEB_INFLUXDB_HOST=scrutiny-influxdb
      - SCRUTINY_WEB_INFLUXDB_PORT=8086
      - SCRUTINY_WEB_INFLUXDB_TOKEN=$SCRUTINY_INFLUXDB_TOKEN
      - SCRUTINY_WEB_INFLUXDB_ORG=scrutiny
      - SCRUTINY_WEB_INFLUXDB_BUCKET=scrutiny
    # DOCKER-LABELS-PLACEHOLDER
